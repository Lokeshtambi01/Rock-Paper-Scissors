<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button" onclick="playgame('Rock')">
        <img src="images/rock-emoji.png" class="move-icon" alt="" srcset="">
    </button>

    <button class="move-button" onclick="playgame('Paper')">
        <img src="images/paper-emoji.png" class="move-icon" alt="" srcset="">
    </button>

    <button class="move-button" onclick="playgame('Scissors')">
        <img src="images/scissors-emoji.png" class="move-icon" alt="" srcset="">
    </button>

    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <button class="reset-score" onclick="
        Score.Win = 0;
        Score.Lose = 0;
        Score.Tie = 0;
        localStorage.removeItem('Score');
        document.querySelector('.js-score').innerHTML = `Wins = ${Score.Win}, Losses = ${Score.Lose}, Ties = ${Score.Tie}`;
        document.querySelector('.js-result').innerHTML = ' ';
        document.querySelector('.js-moves').innerHTML = ' ';
    ">Reset Score</button>

    
    <script src="script.js"></script>
</body>
</html>
